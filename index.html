<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Tracker</title>
    <meta name="description" content="A simple, interactive web application to track student grades, calculate averages, and highlight top performers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Grade Tracker</h1>
            <p>Manage and analyze student performance</p>
        </header>

        <section class="input-section">
            <form id="add-student-form">
                <div class="input-group">
                    <label for="student-name">Student Name</label>
                    <input type="text" id="student-name" placeholder="e.g. Jane Doe">
                </div>
                <div class="input-group">
                    <label for="student-grade">Grade (0-100)</label>
                    <input type="number" id="student-grade" placeholder="e.g. 85" min="0" max="100" step="any">
                </div>
                <button type="submit" id="add-button">
                    <span>Add Student</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </form>
            <div id="error-message" class="error-message hidden"></div>
        </section>

        <section class="dashboard-section">
            <div class="stats-card">
                <h2>Average Grade</h2>
                <div class="average-value" id="average-grade">0.0</div>
            </div>
            
            <div class="list-card">
                <div class="list-header">
                    <h2>Student List</h2>
                    <span class="badge" id="student-count">0 Students</span>
                </div>
                <div class="table-container">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Grade</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="students-list">
                            <!-- Student rows will be injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <p>No students added yet.</p>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
